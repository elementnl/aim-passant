<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aim Passant</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="screen-lobby" class="screen active">
    <div class="lobby-container">
      <h1 class="title">AIM PASSANT</h1>
      <p class="subtitle">FPS Chess in Your Browser</p>
      <div class="lobby-actions">
        <div class="lobby-section">
          <button id="btn-create" class="btn btn-primary">Create Room</button>
          <div id="create-options" class="hidden">
            <input type="text" id="input-room-name-create" placeholder="Room Name" class="input" maxlength="30" autocomplete="off" data-1p-ignore data-lpignore="true">
            <input type="text" id="input-password-create" placeholder="Password (optional)" class="input" autocomplete="off" data-1p-ignore data-lpignore="true">
            <button id="btn-create-confirm" class="btn">Create</button>
          </div>
        </div>
        <div class="divider">or</div>
        <div class="lobby-section">
          <button id="btn-join" class="btn btn-primary">Join Room</button>
          <div id="join-options" class="hidden">
            <input type="text" id="input-room-name-join" placeholder="Room Name" class="input" maxlength="30" autocomplete="off" data-1p-ignore data-lpignore="true">
            <input type="text" id="input-password-join" placeholder="Password (if any)" class="input" autocomplete="off" data-1p-ignore data-lpignore="true">
            <button id="btn-join-confirm" class="btn">Join</button>
          </div>
        </div>
      </div>
      <p id="lobby-error" class="error hidden"></p>
    </div>
  </div>

  <div id="screen-waiting" class="screen">
    <div class="lobby-container">
      <h1 class="title">AIM PASSANT</h1>
      <div class="room-info">
        <p>Room: <span id="room-display-name" class="room-code"></span></p>
        <p id="waiting-status">Waiting for opponent...</p>
      </div>
      <p id="player-color" class="player-color"></p>
      <button id="btn-start" class="btn btn-primary hidden">Start Game</button>
    </div>
  </div>

  <div id="screen-chess" class="screen">
    <div class="chess-container">
      <div id="turn-indicator" class="turn-indicator"></div>
      <div id="captured-white" class="captured-pieces"></div>
      <div id="chess-board" class="chess-board"></div>
      <div id="captured-black" class="captured-pieces"></div>
    </div>
  </div>

  <div id="screen-mapselect" class="screen">
    <div class="mapselect-container">
      <h2 class="mapselect-title">CHOOSE YOUR BATTLEFIELD</h2>
      <div id="map-cards" class="map-cards"></div>
    </div>
  </div>

  <div id="screen-mapwait" class="screen">
    <div class="lobby-container">
      <h2 class="title" style="font-size:1.8rem">DUEL INCOMING</h2>
      <p id="mapwait-info" style="color:#888;margin-top:1rem"></p>
      <p style="color:#666;margin-top:1rem">Opponent is choosing the battlefield...</p>
    </div>
  </div>

  <div id="screen-duel" class="screen">
    <div id="duel-intro" class="duel-intro hidden">
      <div class="intro-content">
        <div class="intro-left">
          <div id="intro-attacker-piece" class="intro-piece"></div>
          <div id="intro-attacker-name" class="intro-name"></div>
          <div id="intro-attacker-weapon" class="intro-weapon"></div>
        </div>
        <div class="intro-center">
          <div class="intro-vs">VS</div>
          <div id="intro-map-name" class="intro-map"></div>
        </div>
        <div class="intro-right">
          <div id="intro-defender-piece" class="intro-piece"></div>
          <div id="intro-defender-name" class="intro-name"></div>
          <div id="intro-defender-weapon" class="intro-weapon"></div>
        </div>
      </div>
    </div>
    <div id="duel-countdown" class="duel-countdown hidden"></div>
    <canvas id="duel-canvas"></canvas>
    <div id="crosshair" class="crosshair">
      <div class="crosshair-line crosshair-top"></div>
      <div class="crosshair-line crosshair-right"></div>
      <div class="crosshair-line crosshair-bottom"></div>
      <div class="crosshair-line crosshair-left"></div>
      <div class="crosshair-dot"></div>
    </div>
    <div id="scope-overlay" class="scope-overlay hidden"></div>
    <div id="reddot-overlay" class="reddot-overlay hidden">
      <div class="reddot-dot"></div>
    </div>
    <div id="charge-bar-container" class="charge-bar-container hidden">
      <div id="charge-fill" class="charge-fill"></div>
    </div>
    <div id="reload-spinner" class="reload-spinner hidden">
      <div class="reload-label">Reloading</div>
      <div class="spinner-ring"></div>
    </div>
    <div id="duel-result" class="duel-result hidden"></div>
    <div id="duel-hud" class="duel-hud">
      <div class="hud-left">
        <div class="hud-health">
          <div id="health-bar" class="health-bar">
            <div id="health-fill" class="health-fill"></div>
          </div>
          <span id="health-text">100</span>
        </div>
      </div>
      <div class="hud-right">
        <div id="weapon-info" class="weapon-info"></div>
        <div class="hud-ammo-block">
          <span id="ammo-text" class="ammo-count">12 / 12</span>
          <span id="reload-indicator" class="reload-indicator hidden">[R] RELOAD</span>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-gameover" class="screen">
    <div class="lobby-container">
      <h1 id="gameover-title" class="title"></h1>
      <p id="gameover-reason"></p>
      <button id="btn-back-lobby" class="btn btn-primary">Back to Lobby</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/lib/chess.js"></script>
  <script src="/shared/pieces.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/network.js"></script>
  <script src="js/lobby.js"></script>
  <script src="js/chess.js"></script>
  <script src="js/fps/constants.js"></script>
  <script src="js/fps/input.js"></script>
  <script src="js/fps/renderer.js"></script>
  <script src="js/fps/arena.js"></script>
  <script src="js/fps/models.js"></script>
  <script src="js/fps/player.js"></script>
  <script src="js/fps/opponent.js"></script>
  <script src="js/fps/gun.js"></script>
  <script src="js/fps/effects.js"></script>
  <script src="js/fps/shooting.js"></script>
  <script src="js/fps/hud.js"></script>
  <script src="js/fps/index.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
